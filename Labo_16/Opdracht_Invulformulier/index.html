<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invulformulier</title>
    <link rel="stylesheet" href="Styles/style.css">
</head>
<body>
<form method="post" action="">
    <fieldset>
        <legend class="title">Persoonlijke informatie</legend>
        <label for="voornaam">Voornaam*:</label>
        <input type="text" placeholder="Your first name" id="voornaam" required autofocus>
        <br>
        <label for="familienaam">Familienaam*:</label>
        <input type="text" placeholder="Your last name" id="familienaam" required>
    </fieldset>
    <fieldset>
        <legend class="title">Sport</legend>
        <span>Welke sport beoefen je?</span>
        <br>
        <input type="checkbox" id="lopen">
        <label for="lopen">Lopen</label>
        <br>
        <input type="checkbox" id="zwemmen">
        <label for="zwemmen">Zwemmen</label>
        <br>
        <input type="checkbox" id="roeien">
        <label for="roeien">Roeien</label>
    </fieldset>
    <fieldset>
        <legend class="title">Communicatievoorkeur</legend>
        <span>Hoe kunnen we je bereiken?</span>
        <br>
        <input type="radio" name="communicatie" id="post">
        <label for="post">Per post</label>
        <br>
        <input type="radio" name="communicatie" id="emailChoice">
        <label for="emailChoice">E-mail</label>
    </fieldset>
    <fieldset>
        <legend class="title">Favorieten</legend>
        <label for="film">Favoriete film:</label>
        <input type="text" name="film" id="film">
        <br>
        <label for="quote">Favoriete quote:</label>
        <input type="text" name="quote" id="quote" placeholder="Schrijf je favoriete quote">
        <br>
        <label for="eten">Favoriete eten:</label>
        <select name="eten" id="eten" multiple>
            <option value="hamburger">Hamburger</option>
            <option value="hot-dog">Hot-dog</option>
            <option value="pizza">Pizza</option>
        </select>
        <br>
        <label for="browser">Favoriete browser:</label>
        <input type="text" name="browser" id="browser">
    </fieldset>
    <fieldset>
        <legend class="title">Beveiliging & contact</legend>
        <label for="wachtwoord">Wachtwoord*:</label>
        <input type="password" name="wachtwoord" id="wachtwoord" required>
        <br>
        <label for="email">E-mailadres:</label>
        <input type="text" name="email" id="email" placeholder="Geef je e-mailadres in">
        <br>
        <label for="site">Favoriete site:</label>
        <input type="text" name="site" id="site" placeholder="Geef de URL van je favoriete site">
    </fieldset>
    <fieldset>
        <legend class="title">Extra informatie</legend>
        <label for="getal1-10">Favoriete getal tussen 1-10:</label>
        <input type="number" name="getal1-10" id="getal1-10" min="1" max="10">
        <br>
        <label for="getal11-1000">Favoriete getal tussen 11-1000:</label>
        <input type="range" name="getal11-1000" id="getal11-1000" min="11" max="1000" step="1">
        <br>
        <label for="geboortedatum">Wanneer ben je geboren:</label>
        <input type="date" name="geboortedatum" id="geboortedatum">
        <br>
        <label for="postcode">Belgische postcode*:</label>
        <input type="text" name="postcode" id="postcode" required placeholder="9999" pattern="^(?:[1-8][0-9]{3}|9[0-8][0-9]{2}|99[0-8][0-9]|999[0-2])$" maxlength="4" >
    </fieldset>
    <fieldset>
        <legend class="title">Varia</legend>
        <label for="zoeken">Zoeken naar iets:</label>
        <input type="search" name="zoeken" id="zoeken">
        <br>
        <label for="kleur">Wat is je lievelingskleur?</label>
        <input type="color" name="kleur" id="kleur">
        <br>
        <input type="file" name="bestand" id="bestand">
    </fieldset>
    <button type="submit">Submit</button>
</form>
<script src="Scripts/script.js"></script>
</body>
</html>
